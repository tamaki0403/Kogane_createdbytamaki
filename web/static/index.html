<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kogane</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 20px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      color: #e6edf3;
      margin-right: 4px;
    }

    .nav-brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #d4a017, #f5c842);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      color: #0d1117;
      flex-shrink: 0;
    }

    .nav-brand-text {
      font-size: 1rem;
      font-weight: bold;
    }

    nav a {
      font-size: 0.9rem;
      color: #8b949e;
      text-decoration: none;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: color 0.2s;
      white-space: nowrap;
    }

    nav a:hover, nav a.active {
      color: #e6edf3;
      border-bottom-color: #58a6ff;
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .login-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .login-btn:hover { background: #4752c4; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .user-info:hover { background: #21262d; }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-name {
      font-size: 0.85rem;
      color: #e6edf3;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page { display: none; padding: 24px 16px; max-width: 640px; margin: 0 auto; }
    .page.active { display: block; }

    .home-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 8px; }
    .home-desc { color: #8b949e; font-size: 0.9rem; margin-bottom: 28px; }

    .card-link {
      display: block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .card-link:hover { border-color: #58a6ff; }
    .card-link .card-title { font-size: 1rem; font-weight: bold; margin-bottom: 4px; }
    .card-link .card-desc { font-size: 0.85rem; color: #8b949e; }

    .page-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #8b949e; margin-bottom: 20px; }

    /* 通常カード */
    .player-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .player-card:hover { border-color: #58a6ff; }

    /* TOP3カード */
    .player-card-top {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .player-card-top:hover { border-color: #58a6ff; }
    .player-card-top.rank1 { border-color: #d4a017; }
    .player-card-top.rank2 { border-color: #a8a9ad; }
    .player-card-top.rank3 { border-color: #b87333; }

    .rank-num {
      font-size: 1rem;
      font-weight: bold;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
      color: #8b949e;
    }

    .rank-num-top {
      font-size: 1.4rem;
      font-weight: bold;
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-num-top.r1 { color: #d4a017; }
    .rank-num-top.r2 { color: #a8a9ad; }
    .rank-num-top.r3 { color: #b87333; }

    .player-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .player-avatar-top {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-size: 0.95rem;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-name-top {
      font-size: 1.1rem;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-rating { font-size: 1.2rem; font-weight: bold; color: #58a6ff; flex-shrink: 0; }
    .player-rating-top { font-size: 1.4rem; font-weight: bold; color: #58a6ff; flex-shrink: 0; }

    .profile-header {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-name { font-size: 1.3rem; font-weight: bold; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-label { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
    .stat-value { font-size: 1.3rem; font-weight: bold; color: #58a6ff; }

    .section-title {
      font-size: 1rem;
      font-weight: bold;
      margin: 20px 0 10px;
      color: #8b949e;
    }

    .stage-row {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stage-no-record {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.4;
    }

    .stage-name { flex: 1; font-size: 0.9rem; }
    .stage-record { font-size: 0.85rem; color: #8b949e; }
    .stage-winrate { font-size: 0.95rem; font-weight: bold; color: #58a6ff; min-width: 48px; text-align: right; }

    .back-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      padding: 6px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .back-btn:hover { color: #e6edf3; border-color: #58a6ff; }

    .loading { text-align: center; color: #8b949e; margin-top: 60px; }
    .error { text-align: center; color: #f85149; margin-top: 60px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand" onclick="showPage('home')">
    <div class="nav-brand-icon">K</div>
    <span class="nav-brand-text">Kogane</span>
  </div>
  <a href="#" onclick="showPage('home')" id="nav-home" class="active">ホーム</a>
  <a href="#" onclick="showPage('ranking')" id="nav-ranking">レートランキング</a>
  <a href="#" onclick="showPage('peak')" id="nav-peak">最高レート</a>
  <a href="#" onclick="showMyPage()" id="nav-mypage" style="display:none;">マイページ</a>
  <div class="nav-right">
    <a class="login-btn" id="login-btn" href="/auth/login">Discordでログイン</a>
    <div class="user-info" id="user-info" style="display:none;" onclick="showMyPage()">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name"></span>
    </div>
  </div>
</nav>

<!-- ホーム -->
<div class="page active" id="page-home">
  <div style="padding-top: 8px;">
    <div class="home-title">Kogane</div>
    <div class="home-desc">スプラトゥーン内部戦のレート管理サイト</div>
    <div class="card-link" onclick="showPage('ranking')">
      <div class="card-title">レートランキング</div>
      <div class="card-desc">現在のレートによる順位表</div>
    </div>
    <div class="card-link" onclick="showPage('peak')">
      <div class="card-title">最高レートランキング</div>
      <div class="card-desc">歴代最高レートTOP5</div>
    </div>
    <div class="card-link" id="my-page-card" onclick="showMyPage()" style="display:none;">
      <div class="card-title">マイページ</div>
      <div class="card-desc">自分の勝率・ステージ別成績を確認</div>
    </div>
  </div>
</div>

<!-- レートランキング -->
<div class="page" id="page-ranking">
  <div class="page-title">レートランキング</div>
  <div class="subtitle" id="ranking-subtitle">読み込み中...</div>
  <div id="ranking-list"><p class="loading">データを取得しています...</p></div>
</div>

<!-- 最高レートランキング -->
<div class="page" id="page-peak">
  <div class="page-title">最高レートランキング</div>
  <div class="subtitle">歴代最高レート TOP5</div>
  <div id="peak-list"><p class="loading">データを取得しています...</p></div>
</div>

<!-- 個人ページ -->
<div class="page" id="page-player">
  <button class="back-btn" id="back-btn" onclick="showPage('ranking')">戻る</button>
  <div id="player-content"><p class="loading">読み込み中...</p></div>
</div>

<script>
  const STAGES = [
    "ユノハナ大渓谷","ゴンズイ地区","ヤガラ市場","マテガイ放水路",
    "ナメロウ金属","マサバ海峡大橋","キンメダイ美術館","マヒマヒリゾート&スパ",
    "海女美術大学","チョウザメ造船","ザトウマーケット","スメーシーワールド",
    "クサヤ温泉","ヒラメが丘団地","ナンプラー遺跡","マンタマリア号",
    "タラポートショッピングパーク","コンブトラック","タカアシ経済特区",
    "オヒョウ海運","バイガイ亭","ネギトロ炭鉱","カジキ空港",
    "リュウグウターミナル","デカライン高架下"
  ];

  let allRanking = [];
  let rankingLoaded = false;
  let peakLoaded = false;
  let currentUserId = null;
  let currentAvatarUrl = null;

  // URLパラメータ確認
  const params = new URLSearchParams(window.location.search);
  const urlId = params.get('id');
  const urlAvatar = params.get('avatar');

  if (urlId) {
    currentUserId = urlId;
    localStorage.setItem('discord_user_id', urlId);
    if (urlAvatar) {
      currentAvatarUrl = urlAvatar;
      localStorage.setItem('discord_avatar', urlAvatar);
    }
    window.history.replaceState({}, '', '/');
  } else {
    currentUserId = localStorage.getItem('discord_user_id');
    currentAvatarUrl = localStorage.getItem('discord_avatar');
  }

  if (currentUserId) {
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('my-page-card').style.display = 'block';
    document.getElementById('nav-mypage').style.display = 'inline';
    document.getElementById('user-info').style.display = 'flex';

    if (currentAvatarUrl) {
      document.getElementById('user-avatar').src = currentAvatarUrl;
    }

    fetch(`/api/player_stats/${currentUserId}`)
      .then(r => r.json())
      .then(d => {
        if (d.display_name) {
          document.getElementById('user-name').textContent = d.display_name;
        }
      }).catch(() => {});
  }

  function getAvatarUrl(userId) {
    if (userId === currentUserId && currentAvatarUrl) return currentAvatarUrl;
    return `https://cdn.discordapp.com/embed/avatars/0.png`;
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    const navEl = document.getElementById('nav-' + name);
    if (navEl) navEl.classList.add('active');

    if (name === 'ranking' && !rankingLoaded) loadRanking();
    if (name === 'peak' && !peakLoaded) loadPeak();
  }

  function showMyPage() {
    if (!currentUserId) {
      window.location.href = '/auth/login';
      return;
    }
    loadPlayerPage(currentUserId, currentAvatarUrl);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-player').classList.add('active');
    document.getElementById('nav-mypage').classList.add('active');
    document.getElementById('back-btn').onclick = () => showPage('home');
  }

  function showPlayerPage(userId) {
    loadPlayerPage(userId, null);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-player').classList.add('active');
    document.getElementById('back-btn').onclick = () => showPage('ranking');
  }

  function rankCard(p, ratingKey) {
    const avatar = getAvatarUrl(p.user_id);
    const name = p.display_name || p.user_id;
    const rating = p[ratingKey];
    const rank = p.rank;

    if (rank <= 3) {
      const cls = `rank${rank}`;
      const rCls = `r${rank}`;
      return `
        <div class="player-card-top ${cls}" onclick="showPlayerPage('${p.user_id}')">
          <span class="rank-num-top ${rCls}">${rank}</span>
          <img class="player-avatar-top" src="${avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
          <div class="player-info">
            <div class="player-name-top">${name}</div>
          </div>
          <div class="player-rating-top">${rating}</div>
        </div>
      `;
    }

    return `
      <div class="player-card" onclick="showPlayerPage('${p.user_id}')">
        <span class="rank-num">${rank}</span>
        <img class="player-avatar" src="${avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
        <div class="player-info">
          <div class="player-name">${name}</div>
        </div>
        <div class="player-rating">${rating}</div>
      </div>
    `;
  }

  async function loadRanking() {
    try {
      const res = await fetch('/api/ranking');
      const data = await res.json();
      allRanking = data.players;
      document.getElementById('ranking-subtitle').textContent = `全${allRanking.length}人`;
      document.getElementById('ranking-list').innerHTML = allRanking.map(p => rankCard(p, 'rating')).join('');
      rankingLoaded = true;
    } catch (e) {
      document.getElementById('ranking-list').innerHTML = '<p class="error">データの取得に失敗しました</p>';
    }
  }

  async function loadPeak() {
    try {
      const res = await fetch('/api/peak_ranking');
      const data = await res.json();
      const top5 = data.players.slice(0, 5);
      const el = document.getElementById('peak-list');
      if (top5.length === 0) {
        el.innerHTML = '<p class="loading">データがありません</p>';
        return;
      }
      el.innerHTML = top5.map(p => rankCard(p, 'peak_rating')).join('');
      peakLoaded = true;
    } catch (e) {
      document.getElementById('peak-list').innerHTML = '<p class="error">データの取得に失敗しました</p>';
    }
  }

  async function loadPlayerPage(userId, avatarUrl) {
    document.getElementById('player-content').innerHTML = '<p class="loading">読み込み中...</p>';
    try {
      const res = await fetch(`/api/player_stats/${userId}`);
      const d = await res.json();
      if (d.error) {
        document.getElementById('player-content').innerHTML = '<p class="error">プレイヤーが見つかりません</p>';
        return;
      }

      const winRate = d.win_rate !== null ? `${d.win_rate}%` : '-';
      const peak = d.peak_rating || '-';
      const avatar = avatarUrl || getAvatarUrl(userId);

      const stageMap = {};
      (d.stage_stats || []).forEach(s => { stageMap[s.stage] = s; });

      const stageRows = STAGES.map(stageName => {
        const s = stageMap[stageName];
        if (s) {
          return `
            <div class="stage-row">
              <div class="stage-name">${stageName}</div>
              <div class="stage-record">${s.wins}勝${s.losses}敗</div>
              <div class="stage-winrate">${s.win_rate !== null ? s.win_rate + '%' : '-'}</div>
            </div>
          `;
        }
        return `
          <div class="stage-no-record">
            <div class="stage-name">${stageName}</div>
            <div class="stage-record">記録なし</div>
            <div class="stage-winrate">-</div>
          </div>
        `;
      }).join('');

      document.getElementById('player-content').innerHTML = `
        <div class="profile-header">
          <div class="profile-top">
            <img class="profile-avatar" src="${avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
            <div class="profile-name">${d.display_name || d.user_id}</div>
          </div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">現在のレート</div>
              <div class="stat-value">${d.rating}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">最高レート</div>
              <div class="stat-value">${peak}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">勝率</div>
              <div class="stat-value">${winRate}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">試合数</div>
              <div class="stat-value">${d.total}</div>
            </div>
          </div>
          <div style="font-size:0.85rem; color:#8b949e;">${d.wins}勝 ${d.losses}敗</div>
        </div>
        <div class="section-title">ステージ別成績</div>
        ${stageRows}
      `;
    } catch (e) {
      document.getElementById('player-content').innerHTML = '<p class="error">データの取得に失敗しました</p>';
    }
  }
</script>
</body>
</html>
